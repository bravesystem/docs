# Static Web App: delightful-mud. Token: variable group + AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUD_0F7873F03
# Pre-built HTML under docs/. If docs is source that must be built here, remove skip_* and set output_location accordingly.

trigger:
  - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: Azure-Static-Web-Apps-delightful-mud-0f7873f03-variable-group

steps:
  - checkout: self

  - task: AzureStaticWebApp@0
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUD_0F7873F03)
      app_location: '/docs'
      api_location: ''
      output_location: ''
      skip_app_build: true
      skip_api_build: true
